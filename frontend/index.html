<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FUSIC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <audio id="fusic-audio" preload="none"></audio>

  <!-- Background Art Layer -->
  <div class="fusic-bg-container">
    <div class="fusic-bg-text">FUSIC</div>
  </div>

  <div class="app-layout">
    <!-- Desktop Left Sidebar -->
    <aside class="sidebar">
      <div class="brand-wrapper">
        <div class="brand" id="brand-fusic">FUSIC</div>
      </div>
      <nav class="nav-links">
        <button class="nav-btn active" data-page="home">Home</button>
        <button class="nav-btn" data-page="search">Search</button>
        <button class="nav-btn" data-page="library">Library</button>
        <button class="nav-btn" data-page="playlists">Playlists</button>
        <button class="nav-btn" data-page="downloads">Downloads</button>
        <button class="nav-btn" data-page="local">Local</button>
      </nav>
      <div class="volume-container">
        <label for="volume-slider" style="font-size:0.8rem; color:var(--text-dim); margin-bottom:8px; display:block;">Volume</label>
        <div class="slider-wrapper">
          <input type="range" id="volume-slider" class="neu-inset" min="0" max="1" step="0.05" value="0.8">
        </div>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content" id="main-view">
      <div class="page-view active" id="page-home">
        <h2>Quick picks</h2>
        <div class="shelf" id="shelf-quick"></div>
        <h2>Recommended</h2>
        <div class="shelf" id="shelf-recommended"></div>
        <h2>Mixed for you</h2>
        <div class="shelf" id="shelf-mixed"></div>
      </div>
      
      <div class="page-view" id="page-search">
        <input type="text" id="search-input" class="neu-inset" placeholder="Search songs, albums, artists...">
        <div id="search-results"></div>
      </div>

      <div class="page-view" id="page-library">
        <div class="tabs" style="display:flex; gap:16px; margin-bottom:24px;">
          <button class="text-btn active" style="color:var(--crimson-hi);">Liked Songs</button>
          <button class="text-btn">History</button>
        </div>
        <div class="track-list" id="library-list"></div>
      </div>
      
      <div class="page-view" id="page-playlists"><h2>Playlists</h2></div>
      <div class="page-view" id="page-downloads"><h2>Downloads</h2><div id="downloads-list"></div></div>
      <div class="page-view" id="page-local">
        <button class="neu-raised" style="padding:16px 32px; border-radius:8px; font-weight:bold; color:var(--text);" id="btn-open-folder">Open Folder</button>
      </div>
    </main>

    <!-- Right Panel / Now Playing (Desktop) / Fullscreen Overlay (Mobile) -->
    <aside class="now-playing" id="now-playing-panel">
      <!-- Mobile Top Controls -->
      <div class="drag-handle" id="np-drag-handle"></div>
      <button class="close-chevron icon-btn" id="btn-close-player">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M6 9l6 6 6-6"/></svg>
      </button>

      <img id="np-art" class="np-art" src="" alt="Album Art">

      <div class="track-info">
        <div id="np-title">Title</div>
        <div id="np-artist">Artist</div>
      </div>

      <div class="progress-container">
        <span id="time-current">0:00</span>
        <div class="slider-wrapper">
          <input type="range" id="seek-slider" min="0" max="100" value="0" step="0.1">
        </div>
        <span id="time-total">0:00</span>
      </div>

      <div class="controls-row">
        <button id="btn-shuffle" class="icon-btn">
          <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
        </button>
        <button id="btn-prev" class="icon-btn">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button id="btn-play-pause" class="icon-btn play-btn">
          <svg id="icon-play" viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="icon-pause" viewBox="0 0 24 24" width="24" height="24" fill="currentColor" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button id="btn-next" class="icon-btn">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
        <button id="btn-repeat" class="icon-btn">
          <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        </button>
      </div>

      <div class="bottom-actions-row">
        <button class="text-btn" id="btn-like">♥ Like</button>
        <button class="text-btn" id="btn-lyrics">Lyrics</button>
        <button class="text-btn" id="btn-queue">Queue</button>
        <button class="text-btn" id="btn-download">Download</button>
      </div>

      <div class="lyrics-strip" id="lyrics-strip">
        <div id="lyric-current" class="lyric-current"></div>
        <div id="lyric-next" class="lyric-next"></div>
      </div>
      
      <div id="queue-panel" style="display:none; width:100%; margin-top:24px;">
        <h3 style="margin-bottom:12px; font-size:1rem;">Queue</h3>
        <div id="queue-list" style="width:100%"></div>
      </div>
    </aside>

  </div>

  <!-- Mini Player (Mobile Only) -->
  <div id="mini-player" class="mini-player" style="display:none;">
    <img id="mp-art" class="mp-art" src="" alt="Album Art">
    <div class="mp-info">
      <div id="mp-title">Title</div>
      <div id="mp-artist">Artist</div>
    </div>
    <button id="btn-mp-play-pause" class="icon-btn mp-play-btn">
      <svg id="mp-icon-play" viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      <svg id="mp-icon-pause" viewBox="0 0 24 24" width="24" height="24" fill="currentColor" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>
  </div>

  <!-- Mobile Floating Action Button -->
  <button id="mobile-fab" class="fab neu-raised">
    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
  </button>

  <!-- Mobile Bottom Sheet -->
  <div id="bottom-sheet-overlay" class="overlay"></div>
  <div id="bottom-sheet" class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-content">
      <button class="sheet-btn" data-page="home">🏠 Home</button>
      <button class="sheet-btn" data-page="search">🔍 Search</button>
      <button class="sheet-btn" data-page="library">📚 Library</button>
      <button class="sheet-btn" data-page="playlists">📋 Playlists</button>
      <button class="sheet-btn" data-page="downloads">⬇ Downloads</button>
      <button class="sheet-btn" data-page="local">📁 Local Music</button>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
